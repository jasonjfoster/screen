# Python version of the usethis-generated test-coverage.yaml (no official Python coverage template)
# Need help debugging build failures? Start at https://docs.github.com/en/actions
on:
  push:
    branches: [main, master]
  pull_request:

name: test-coverage-py.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python # mirrors R's working-directory: './r'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'  # mirrors R 'release'

      # mirrors R's `Install dependencies`: install_deps(dependencies = TRUE) + covr + xml2
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
          pip install coverage pytest # covr + xml2 equivalent (coverage produces Cobertura XML)

      # mirrors R's `Test coverage`: package_coverage() -> print(cov) -> to_cobertura(cov)
      - name: Test coverage
        run: |
          coverage run -m pytest        # covr::package_coverage(path = "./r", quiet = FALSE)
          coverage report               # print(cov)
          coverage xml -o cobertura.xml # covr::to_cobertura(cov) -> cobertura.xml

      - uses: codecov/codecov-action@v7
        with:
          # fail if error if not on PR or if on PR and token is given
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}
          files: ./python/cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      # mirrors R's `Show testthat output`: surface the test log unconditionally
      - name: Show pytest output
        if: always()
        run: cat .pytest_cache/v/cache/lastfailed || true

      # mirrors R's `Upload test results` on failure
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures-python
          path: ./python/.pytest_cache
